name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backend:
    name: Backend pytest
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: python -m pip install uv==0.11.21

      - name: Run backend tests
        run: uv run --project backend --extra dev pytest -q

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker compose smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Build and start services
        run: docker compose up --build -d

      - name: Verify backend health
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://localhost:8000/health | grep -q '{"status":"ok"}'; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs backend
          exit 1

      - name: Verify frontend home page
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://localhost:3000 | grep -q "Scientific Spaces AI Learning OS"; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs frontend
          exit 1

      - name: Stop services
        if: always()
        run: docker compose down --volumes --remove-orphans

  workflow_policy:
    name: Workflow policy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Validate workflow pins and permissions
        run: python scripts/security/check_workflow_policy.py

      - name: Validate suppression policy
        run: python scripts/security/validate_suppressions.py

  dependency_audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "22"

      - name: Install uv
        run: python -m pip install uv==0.11.21

      - name: Audit locked Python and npm dependencies
        run: python scripts/security/run_dependency_audit.py

  secret_audit:
    name: Secret audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout full bounded history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Scan tracked files and bounded history
        run: python scripts/security/run_secret_audit.py

  sbom_validation:
    name: SBOM validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv==0.11.21

      - name: Build temporary CycloneDX SBOMs
        run: python scripts/security/build_sbom.py --output-dir "$RUNNER_TEMP/p3-005-sbom"

      - name: Validate temporary CycloneDX SBOMs
        run: python scripts/security/validate_sbom.py "$RUNNER_TEMP/p3-005-sbom"

  release_evidence:
    name: Release evidence dry-run
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
      - docker
      - workflow_policy
      - dependency_audit
      - secret_audit
      - sbom_validation
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    permissions:
      contents: read
    steps:
      - name: Checkout exact tag history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install uv==0.11.21

      - name: Select release evidence tag
        id: release_tag
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            tag="$GITHUB_REF_NAME"
          else
            tag="v1.1.0"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Build and validate temporary SBOMs
        run: |
          python scripts/security/build_sbom.py --output-dir "$RUNNER_TEMP/p3-005-release"
          python scripts/security/validate_sbom.py "$RUNNER_TEMP/p3-005-release"

      - name: Build no-publish release evidence
        run: |
          python scripts/release/build_release_evidence.py \
            --tag "${{ steps.release_tag.outputs.tag }}" \
            --sbom-dir "$RUNNER_TEMP/p3-005-release" \
            --dry-run \
            --no-publish

      - name: Verify release evidence without network
        run: |
          python scripts/release/verify_release_evidence.py \
            --evidence "$RUNNER_TEMP/p3-005-release/release-evidence.json" \
            --no-network
