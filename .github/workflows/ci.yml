name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  backend:
    name: Backend pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: python -m pip install uv

      - name: Run backend tests
        run: uv run --project backend --extra dev pytest -q

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker compose smoke
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start services
        run: docker compose up --build -d

      - name: Verify backend health
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://localhost:8000/health | grep -q '{"status":"ok"}'; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs backend
          exit 1

      - name: Verify frontend home page
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://localhost:3000 | grep -q "Scientific Spaces AI Learning OS"; then
              exit 0
            fi
            sleep 2
          done
          docker compose logs frontend
          exit 1

      - name: Stop services
        if: always()
        run: docker compose down --volumes --remove-orphans
