[pytest]
testpaths = backend/tests
pythonpath = backend
markers =
    live: checks that contact the live Scientific Spaces source; skipped unless RUN_LIVE_TESTS=1 is set.
    browser_live: checks browser-based live Scientific Spaces access; skipped unless RUN_LIVE_TESTS=1 is set.
    pdf_live: checks live Scientific Spaces article PDF export; skipped unless RUN_LIVE_TESTS=1 is set.
